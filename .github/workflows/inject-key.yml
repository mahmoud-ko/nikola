name: Deploy and run app

on:
  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run app with secret
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node app.js

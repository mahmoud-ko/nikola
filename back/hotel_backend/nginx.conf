# ============================================================
#  nginx.conf  —  drop inside your server {} block
#  (alternative to .htaccess for Nginx users)
# ============================================================

server {
    listen 80;
    server_name your-domain.com;          # ← change me
    root /var/www/html/hotel_backend;     # ← change me
    index index.php;

    charset utf-8;

    # Route all requests through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP to FastCGI (php-fpm)
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;   # ← adjust PHP version
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Block access to sensitive files
    location ~* \.(sql|md|log|env)$ {
        deny all;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options        "DENY";
    add_header X-XSS-Protection       "1; mode=block";
}
